<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": {{ .Permalink | jsonify | safeJS }}
    },
    "headline": {{ .Title | jsonify | safeJS }},
    "image": {
      "@type": "ImageObject",
      "url": {{ absURL (.Params.thumbnail | default "images/default.png") | jsonify | safeJS }},
      "height": 800,
      "width": 800
    },
    "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeJS }},
    "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeJS }},
    "author": {
      "@type": "Person",
      "name": {{ (.Site.Params.author.name | default .Site.Title) | jsonify | safeJS }}
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ .Site.Title | jsonify | safeJS }},
      "logo": {
        "@type": "ImageObject",
        "url": {{ printf "%simages/logo.png" .Site.BaseURL | jsonify | safeJS }},
        "width": 600,
        "height": 60
      }
    },
    "description": {{ (.Params.description | default (.Summary | plainify | truncate 160)) | jsonify | safeJS }}
  }
</script>
