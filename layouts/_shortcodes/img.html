{{/* [mod] loading は lazy/eager のみ受け付け、decoding は常に async */}}
{{- $loading := "lazy" -}}
{{- with .Get "loading" -}}
  {{- if eq (printf "%T" .) "string" -}}
    {{- if or (eq . "lazy") (eq . "eager") -}}
      {{- $loading = . -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
<figure{{ if .Get "class" }} class="{{ .Get "class" }}"{{ end }}>
  <img src="{{ .Get "src" | absURL }}" alt="{{ .Get "caption" }}"{{ with (.Get "w") }} width="{{ . }}"{{ end }}{{ with (.Get "h") }} height="{{ . }}"{{ end }} loading="{{ $loading }}" decoding="async">
  {{ if .Get "caption" }}
  <figcaption>
    {{ if .Get "href" }}
    <a href="{{ .Get "href" }}" rel="noopener" target="_blank">{{ .Get "caption" }}</a>
    {{ else }}
    {{ .Get "caption" }}
    {{ end }}
  </figcaption>
  {{ end }}
</figure>
