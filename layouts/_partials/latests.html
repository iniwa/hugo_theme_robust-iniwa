{{/* [mod] 上流は固定 10 件。Site.Params.latests_count で可変化（未設定時は 10 件） */}}
<section class="sidebar">
  <header>LATESTS</header>
  <div class="articles sm">
    {{ range $i, $p := (first (.Site.Params.latests_count | default 10) .Site.RegularPages) }}
    {{ .Render "li_sm" }}
    {{ end }}
  </div>
</section>
