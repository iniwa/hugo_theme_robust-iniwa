<section class="sidebar">
  <header>{{ .key | upper }}</header>
  <ul class="terms">
    {{/* [mod] BaseURL の文字列連結ではなく、ByCount の各エントリが持つ Page object を使う */}}
    {{ range $entry := first 10 .value.ByCount }}
    {{ with $entry.Page }}
    <li><a href="{{ .RelPermalink }}">{{ $entry.Term }} <span class="count">({{ $entry.Count }})</span></a></li>
    {{ end }}
    {{ end }}
  </ul>
</section>
