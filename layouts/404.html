{{/* [mod] 上流の 404.html はタイトルだけだったため、トップへのリンクと最新記事 5 件を表示するよう拡張 */}}
{{ define "title" }}404 Not Found - {{ end }}

{{ define "main" }}
<header class="page-header">
  <h1>404 - ページが見つかりません</h1>
</header>

<section class="not-found">
  <p>お探しのページは移動・削除されたか、URLが間違っている可能性があります。</p>
  <p>
    <a href="{{ .Site.BaseURL }}">▶ トップページへ戻る</a>
  </p>
</section>

<section class="not-found-latests">
  <h2>最新の記事</h2>
  <div class="articles sm">
    {{ range first 5 .Site.RegularPages }}
    {{ .Render "li_sm" }}
    {{ end }}
  </div>
</section>
{{ end }}
